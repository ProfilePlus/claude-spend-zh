      - img [ref=e50]
    - generic:
      - paragraph [ref=e52]:
        - text: Every time you send a message, Claude doesn't just read your latest message. It
        - strong [ref=e1889]: re-reads the entire conversation
        - text: from the start. That's why tokens add up fast.
      - generic [ref=e54]:
        - generic [ref=e55]: "Example: A 3-message conversation"
        - generic [ref=e56]:
          - generic [ref=e57]: Msg 1
          - generic [ref=e58]: You send "help me fix this bug". Claude reads your message fresh (input) and saves the conversation to cache (cache write).
          - generic [ref=e59]: ~4K tokens
        - generic [ref=e60]:
          - generic [ref=e61]: Msg 2
          - generic [ref=e62]: You reply "try another file". Claude reuses message 1 from cache (cache read — 10x cheaper), only processes your new message fresh (input). Then saves the updated conversation (cache write).
          - generic [ref=e63]: ~8K tokens
        - generic [ref=e64]:
          - generic [ref=e65]: Msg 3
          - generic [ref=e66]: Claude reuses messages 1-2 from cache (cache read) and processes your new message fresh (input). Claude's reply is output.
          - generic [ref=e67]: ~14K tokens
        - generic [ref=e68]: Without cache, every message would be processed at full price. Cache reads save you up to 10x on repeated context.
      - generic [ref=e69]:
        - generic [ref=e72]:
          - strong [ref=e1890]: Input
          - text: — Your messages + conversation history, processed fresh. Billed at full price.
        - generic [ref=e76]:
          - strong [ref=e1891]: Cache Write
          - text: — Claude saves your conversation so it doesn't have to reprocess everything next time. Costs 1.25x input, but only happens once.
        - generic [ref=e80]:
          - strong [ref=e1892]: Cache Read
          - text: — Later messages reuse saved context. 10x cheaper than input. More cache reads = more savings.
        - generic [ref=e84]:
          - strong [ref=e1893]: Output
          - text: — What Claude writes back. Highest per-token price, but usually the smallest amount.
      - generic [ref=e86]:
        - strong [ref=e1894]: "Tip:"
        - text: Use
        - code [ref=e1895]: /clear
        - text: when switching tasks. It resets the conversation so Claude stops re-reading old context you no longer need.
